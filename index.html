<!DOCTYPE html>
<html lang="ru" style="background:#090c0a">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fitofity" />
    <meta name="theme-color" content="#090c0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="Fitofity" />

    <!-- SEO / OG -->
    <meta name="description" content="Трекер тренировок" />
    <meta property="og:title" content="Fitofity" />
    <meta property="og:description" content="Трекер тренировок" />
    <meta property="og:type" content="website" />

    <title>Fitofity</title>

    <!-- iOS иконки (положи файлы в корень dist/) -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="./apple-touch-icon-120x120.png" />

    <!-- Стандартная иконка / favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script type="module" src="./app.js"></script>
    <link rel="stylesheet" href="./app.css">
    <link rel="manifest" href="./manifest.webmanifest">
    <script id="vite-plugin-pwa:register-sw" src="./registerSW.js"></script>
  </head>
  <body style="background:#090c0a">
    <div id="root"></div>
  </body>
</html>
